<form #f="ngForm" (ngSubmit)="onFormSubmit(f)">
<label>Model:</label>
<select #selectedModel ngModel name="model" ngModel required>
    <option value="" disabled selected>Choose an option</option>
    @for(m of models();track m.code){
        <option [value]="m.code">{{m.description}}</option>
    }
</select>
@if(selectedModel.value){
<label>Color:</label>
<select ngModel name="color" required>
    <option value="" disabled selected>Choose an option</option>
    @for(c of colors();track c.code){
        <option [value]="c.code">{{c.description}}</option>
    }
</select>
}
</form>
